<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <clipPath id="scr"><rect x="0" y="0" width="360" height="720" rx="28"/></clipPath>
  <g clip-path="url(#scr)">
    <rect x="0" y="0" width="360" height="720" fill="#e3ebf2"/>
    <!-- status bar -->
    <rect x="0" y="0" width="360" height="28" fill="#ffffff"/>
    <text x="20" y="19" font-size="13" font-weight="700" fill="#0f1419">9:41</text>
    <rect x="316" y="10" width="22" height="10" rx="2" fill="none" stroke="#0f1419" stroke-width="1.2"/>
    <rect x="318" y="12" width="14" height="6" rx="1" fill="#0f1419"/>
    <!-- header -->
    <rect x="0" y="28" width="360" height="56" fill="#ffffff"/>
    <line x1="0" y1="84" x2="360" y2="84" stroke="#e6e9ec" stroke-width="1"/>
    <circle cx="52" cy="56" r="20" fill="#46b358"/>
    <text x="52" y="63" font-size="20" text-anchor="middle">🍀</text>
    <text x="84" y="52" font-size="16" font-weight="700" fill="#0f1419">Support Luck1y</text>
    <text x="84" y="70" font-size="12" fill="#8a97a3">bot</text>

    <!-- incoming bubble -->
    <rect x="15" y="105" width="304" height="163" rx="16" fill="#000000" fill-opacity="0.05"/>
    <rect x="14" y="104" width="304" height="162" rx="16" fill="#ffffff"/>
    <text x="30" y="134" font-size="15" font-weight="700" fill="#0f1419">👋 Hi, Islom!</text>
    <text x="30" y="164" font-size="13.5" fill="#0f1419">This is the support bot for <tspan font-weight="700">@utofi</tspan> 💛</text>
    <text x="30" y="187" font-size="13.5" fill="#0f1419">Support the developer with</text>
    <text x="30" y="206" font-size="13.5" fill="#0f1419">Telegram Stars ⭐️</text>
    <text x="30" y="240" font-size="13.5" fill="#0f1419">Pick an option from the menu below 👇</text>
    <text x="300" y="256" font-size="10" fill="#8a97a3" text-anchor="end">9:41</text>

    <!-- reply keyboard -->
    <rect x="0" y="556" width="360" height="164" fill="#cfd6dc"/>
    <g font-size="13.5" fill="#0f1419" text-anchor="middle" font-weight="600">
      <rect x="14" y="568" width="160" height="34" rx="8" fill="#ffffff"/>
      <text x="94" y="590">💳 Donate</text>
      <rect x="186" y="568" width="160" height="34" rx="8" fill="#ffffff"/>
      <text x="266" y="590">📊 Stats</text>

      <rect x="14" y="610" width="160" height="34" rx="8" fill="#ffffff"/>
      <text x="94" y="632">👤 My donations</text>
      <rect x="186" y="610" width="160" height="34" rx="8" fill="#ffffff"/>
      <text x="266" y="632">🌐 Language</text>

      <rect x="14" y="652" width="160" height="34" rx="8" fill="#ffffff"/>
      <text x="94" y="674">ℹ️ Help</text>
      <rect x="186" y="652" width="160" height="34" rx="8" fill="#ffffff"/>
      <text x="266" y="674">⚙️ Admin</text>
    </g>
  </g>
</svg>
