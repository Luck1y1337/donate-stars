services:
  - type: worker
    name: luck1y-donate-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: THANK_YOU_STICKER_ID
        sync: false
      - key: DB_PATH
        value: /var/data/bot.db
    disk:
      name: bot-data
      mountPath: /var/data
      sizeGB: 1
